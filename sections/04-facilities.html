<!-- ===== FACILITIES ===== -->
<section id="facilities" style="padding:clamp(70px,9vw,130px) clamp(18px,5vw,80px);background:#0F0F11;border-top:1px solid rgba(255,255,255,.05)">
  <div style="max-width:1240px;margin:0 auto">
    <div data-reveal style="max-width:640px;margin-bottom:clamp(36px,5vw,60px)">
      <div style="font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#E6B94E;margin-bottom:14px">World-Class Facilities</div>
      <h2 style="font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,5.5vw,66px);line-height:.98;margin:0;text-transform:uppercase">Everything You Need<br>Under One Roof</h2>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px">
      <sc-for list="{{ facilities }}" as="f" hint-placeholder-count="0">
        <div data-reveal data-tilt style="position:relative;height:300px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:transform .3s,box-shadow .3s" style-hover="box-shadow:0 24px 50px rgba(0,0,0,.55)">
          <img src="{{ f.img }}" alt="{{ f.name }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s ease" style-hover="transform:scale(1.09)">
          <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,11,12,.15) 0%,rgba(11,11,12,.35) 45%,rgba(11,11,12,.94) 100%);pointer-events:none"></div>
          <div style="position:absolute;left:0;right:0;bottom:0;padding:22px;pointer-events:none">
            <div style="width:34px;height:3px;background:linear-gradient(90deg,#E53935,#E6B94E);margin-bottom:12px;border-radius:2px"></div>
            <h3 style="font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:0;text-transform:uppercase;color:#fff">{{ f.name }}</h3>
            <p style="font-size:13px;line-height:1.5;color:#C4C2BE;margin:6px 0 0">{{ f.desc }}</p>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</section>\n
