<!-- ===== HERO ===== -->
<section id="home" style="position:relative;min-height:100vh;display:flex;align-items:center;padding:120px clamp(18px,5vw,80px) 90px;background:#0B0B0C;overflow:hidden">
  <div style="position:absolute;inset:0;background-image:url('assets/hero-hanuman.webp');background-size:cover;background-position:center;animation:kenburns 26s ease-in-out infinite alternate;will-change:transform"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,11,12,.62) 0%,rgba(11,11,12,.5) 42%,rgba(11,11,12,.86) 100%)"></div>
  <div style="position:absolute;top:-140px;right:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(230,185,78,.28),transparent 68%);filter:blur(20px);animation:glowPulse 6s ease-in-out infinite;pointer-events:none"></div>
  <div style="position:absolute;bottom:-160px;left:-120px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(229,57,53,.26),transparent 68%);filter:blur(20px);animation:glowPulse 7s ease-in-out infinite;pointer-events:none"></div>
  <div style="position:relative;max-width:1240px;margin:0 auto;width:100%">
    <div style="display:inline-flex;align-items:center;gap:10px;padding:8px 16px;border:1px solid rgba(230,185,78,.4);border-radius:100px;background:rgba(230,185,78,.08);margin-bottom:26px;animation:heroUp .8s cubic-bezier(.22,.7,.2,1) both">
      <span style="width:7px;height:7px;border-radius:50%;background:#E6B94E;box-shadow:0 0 10px #E6B94E"></span>
      <span style="font-size:12.5px;font-weight:600;letter-spacing:2.5px;color:#E6B94E;text-transform:uppercase">Panvel · Maharashtra</span>
    </div>
    <h1 style="font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(48px,8.5vw,116px);line-height:.92;letter-spacing:.5px;margin:0;text-transform:uppercase;color:#F4F2EE;max-width:14ch;text-shadow:0 6px 40px rgba(0,0,0,.5);animation:heroUp .9s cubic-bezier(.22,.7,.2,1) .12s both">Transform Your Body.<br><span style="background:linear-gradient(90deg,#E53935,#FF7A34,#E6B94E,#FF7A34,#E53935);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 6s linear infinite">Build Your Discipline.</span></h1>
    <p style="max-width:56ch;margin:26px 0 0;font-size:clamp(15px,1.6vw,18.5px);line-height:1.65;color:#C4C2BE;animation:heroUp .9s cubic-bezier(.22,.7,.2,1) .26s both">Premium gym experience with world-class equipment, certified trainers, and a motivating community in the heart of Panvel.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:36px;animation:heroUp .9s cubic-bezier(.22,.7,.2,1) .4s both">
      <a href="#membership" data-magnetic style="font-family:'Bebas Neue';font-size:22px;letter-spacing:1.5px;color:#0B0B0C;padding:16px 40px;border-radius:9px;background:linear-gradient(90deg,#E53935,#E6B94E);box-shadow:0 14px 34px rgba(229,57,53,.4);transition:transform .18s ease-out,box-shadow .2s" style-hover="box-shadow:0 18px 44px rgba(230,185,78,.5)">JOIN TODAY</a>
      <a href="#contact" data-magnetic style="font-family:'Bebas Neue';font-size:22px;letter-spacing:1.5px;color:#F4F2EE;padding:16px 40px;border-radius:9px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.04);backdrop-filter:blur(6px);transition:border-color .25s,color .25s,transform .18s ease-out" style-hover="border-color:#E6B94E;color:#E6B94E">BOOK FREE TRIAL</a>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:20px;margin-top:56px;max-width:760px;animation:heroUp .9s cubic-bezier(.22,.7,.2,1) .55s both">
      <sc-for list="{{ heroStats }}" as="s" hint-placeholder-count="4">
        <div style="border-left:2px solid rgba(230,185,78,.5);padding-left:16px">
          <div style="display:flex;align-items:baseline;gap:4px;font-family:'Bebas Neue';font-size:clamp(34px,4vw,52px);line-height:1;color:#F4F2EE">
            <span data-counter data-value="{{ s.value }}" data-decimals="{{ s.decimals }}" data-suffix="{{ s.suffix }}">{{ s.display }}</span>
            <sc-if value="{{ s.star }}" hint-placeholder-val="{{ false }}"><span style="color:#E6B94E;font-size:.6em">★</span></sc-if>
          </div>
          <div style="font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:#9C9A96;margin-top:7px">{{ s.label }}</div>
        </div>
      </sc-for>
    </div>
  </div>
  <div style="position:absolute;left:50%;bottom:26px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;animation:floatY 2.4s ease-in-out infinite;pointer-events:none">
    <span style="font-size:10.5px;letter-spacing:3px;color:#8A8884;text-transform:uppercase">Scroll</span>
    <span style="width:1px;height:38px;background:linear-gradient(#E6B94E,transparent)"></span>
  </div>
</section>\n
