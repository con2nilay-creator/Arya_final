<!-- ===== OUTLINE MARQUEE ===== -->
<div style="position:relative;overflow:hidden;background:#0B0B0C;border-top:1px solid rgba(230,185,78,.22);border-bottom:1px solid rgba(230,185,78,.22);padding:18px 0">
  <div style="display:flex;width:max-content;animation:marquee 34s linear infinite reverse;will-change:transform">
    <sc-for list="{{ marqueeWords }}" as="mw" hint-placeholder-count="8">
      <span style="display:flex;align-items:center;gap:34px;padding:0 17px;white-space:nowrap;font-family:'Anton';font-size:clamp(20px,2.6vw,32px);letter-spacing:2.5px;color:transparent;-webkit-text-stroke:1.3px rgba(230,185,78,.75);text-transform:uppercase">{{ mw }}<span style="width:10px;height:10px;transform:rotate(45deg);border:1.3px solid rgba(230,185,78,.75)"></span></span>
    </sc-for>
  </div>
</div>\n
